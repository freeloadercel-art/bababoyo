<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Spin Wheel - Holodomor Facts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; padding: 20px; max-width: 600px; width: 100%; }
        canvas { display: inline-block; max-width: 100%; height: auto; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        button { background: #b22222; color: white; border: none; padding: 12px 30px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 20px 0; transition: 0.2s; }
        button:hover { background: #8b1a1a; transform: scale(1.02); }
        .fact-box { background: #f1f5f9; border-left: 6px solid #b22222; padding: 1rem; border-radius: 8px; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <canvas id="wheelCanvas" width="500" height="500"></canvas>
    <br>
    <button id="spinBtn"><i class="fas fa-sync-alt"></i> SPIN</button>
    <div id="factDisplay" class="fact-box"><i class="fas fa-lightbulb"></i> Spin the wheel to reveal a fact.</div>
</div>
<script>
    const facts = [
        "The word 'Holodomor' was not used publicly until the 1980s; before that, it was a forbidden topic in the USSR.",
        "Stalin personally ordered that Ukraine's borders be sealed in December 1932 to prevent peasants from fleeing the famine.",
        "The number of children who died during the Holodomor is estimated at over 1 million.",
        "Some villages were so depopulated that the Soviet government erased them from official maps.",
        "Survivors often had to eat tree bark, grass, cats, and in extreme cases, human flesh to survive.",
        "The 'Black Lists' (Chorni doshky) were boards posted in villages publicly shaming those who allegedly hid grain; they were cut off from all food supplies.",
        "Foreign journalists Gareth Jones and Malcolm Muggeridge risked their lives to report on the famine; Western media mocked them as liars.",
        "The Ukrainian language was suppressed during the famine; speaking Ukrainian could lead to arrest.",
        "In 2006, Ukraine officially recognized the Holodomor as genocide; Russia still denies it.",
        "During the Holodomor, the Soviet government exported grain to Europe while Ukrainians starved."
    ];

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const factDisplay = document.getElementById('factDisplay');

    const segments = facts.length;
    const angleStep = (2 * Math.PI) / segments;
    let currentRotation = 0;
    let spinning = false;

    function drawWheel() {
        const size = canvas.width;
        const center = size / 2;
        const radius = size / 2;
        ctx.clearRect(0, 0, size, size);
        for (let i = 0; i < segments; i++) {
            const startAngle = i * angleStep + currentRotation;
            const endAngle = startAngle + angleStep;
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.arc(center, center, radius, startAngle, endAngle);
            ctx.fillStyle = `hsl(${i * 45}, 70%, 55%)`;
            ctx.fill();
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(startAngle + angleStep / 2);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "white";
            ctx.font = "bold 16px 'Segoe UI'";
            ctx.fillText((i+1).toString(), radius * 0.7, 0);
            ctx.restore();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.arc(center, center, radius, startAngle, endAngle);
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(center, center, 20, 0, 2 * Math.PI);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.strokeStyle = "#b22222";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function spin() {
        if (spinning) return;
        spinning = true;
        const spinAngle = Math.random() * 360 + 720;
        const startTime = performance.now();
        const duration = 2000;

        function animate(now) {
            const elapsed = now - startTime;
            const t = Math.min(1, elapsed / duration);
            const easeOut = 1 - Math.pow(1 - t, 3);
            const newRot = currentRotation + (spinAngle * Math.PI / 180) * easeOut;
            currentRotation = newRot % (2 * Math.PI);
            drawWheel();
            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                const pointerAngle = -Math.PI / 2;
                let rawAngle = (pointerAngle - currentRotation + 2 * Math.PI) % (2 * Math.PI);
                let segmentIndex = Math.floor(rawAngle / angleStep) % segments;
                factDisplay.innerHTML = `<i class="fas fa-lightbulb"></i> ${facts[segmentIndex]}`;
                spinning = false;
            }
        }
        requestAnimationFrame(animate);
    }

    spinBtn.addEventListener('click', spin);
    drawWheel();
</script>
</body>
</html>
