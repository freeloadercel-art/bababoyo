<section id="intro" style="position:relative;overflow:hidden;height:100vh;color:white;">
  <!-- 3D Movable Background -->
  <div id="bg-layer" style="
      position:absolute;
      top:0; left:0;
      width:120%; height:120%;
      background-image:url('https://upload.wikimedia.org/wikipedia/commons/4/47/Space_Nebula.jpg');
      background-size:cover;
      background-position:center;
      transform:translate3d(0,0,0);
      transition:transform 0.1s;
      z-index:0;
  "></div>

  <!-- Content -->
  <div style="position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:4rem;">
    <h1 style="font-size:3rem;font-weight:700;margin-bottom:1rem;">The Holodomor: A Spatial Analysis</h1>
    <p style="font-size:1.2rem;line-height:1.8;">
      The <strong>Holodomor</strong> (from Ukrainian <em>moryty holodom</em> – "to kill by starvation") was a man-made famine that killed an estimated <strong>3.9 million Ukrainians</strong> in 1932–1933...
    </p>
    <!-- More text here -->
  </div>
</section>

<script>
const bg = document.getElementById('bg-layer');
document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30; // horizontal movement
    const y = (e.clientY / window.innerHeight - 0.5) * 30; // vertical movement
    bg.style.transform = `translate3d(${x}px, ${y}px, 0) scale(1.05)`;
});
</script>
